name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo dependencies
      uses: Swatinem/rust-cache@v2

    - name: Build
      run: cargo build --release --manifest-path subproject/penguin-downloader-tui/Cargo.toml

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: penguin-downloader-tui-${{ runner.os }}
        path: |
          subproject/penguin-downloader-tui/target/release/penguin-downloader-tui
          subproject/penguin-downloader-tui/target/release/penguin-downloader-tui.exe
        if-no-files-found: warn
